<head>

    <meta name="description" content="Sign in to QCut">

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script src="../lang/zh.js"></script>

    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-50 bg-primary nav-border">
        <div class="max-w-5xl mx-auto px-6">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center space-x-8">
                    <a href="../" class="flex items-center space-x-2">

                    </a>
                    <div class="hidden md:flex items-center space-x-6">
                        <a href="../index.html#features" class="nav-link text-sm text-muted hover:text-primary transition-colors" data-i18n="nav.features">Features</a>
                        <a href="pricing.html" class="nav-link text-sm text-muted hover:text-primary transition-colors" data-i18n="nav.pricing">Pricing</a>
                        <a href="../releases.html" class="nav-link text-sm text-muted hover:text-primary transition-colors">Releases</a>
                        <a href="../blog.html" class="nav-link text-sm text-muted hover:text-primary transition-colors" data-i18n="nav.docs">Docs</a>
                        <a href="../index.html#contact" class="nav-link text-sm text-muted hover:text-primary transition-colors" data-i18n="nav.contact">Contact</a>
                    </div>

                        <button id="lang-btn" onclick="toggleLangMenu()" class="theme-toggle flex items-center space-x-1" aria-label="Select language">
                            <i data-lucide="globe" class="w-4 h-4"></i>
                            <span class="text-sm" id="lang-label">EN</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div id="lang-menu" class="hidden absolute right-0 mt-2 w-32 card rounded-lg shadow-lg py-1 z-50">
                            <button onclick="switchLanguage('en')" class="w-full px-4 py-2 text-left text-sm hover:bg-secondary flex items-center space-x-2"><span class="font-mono text-xs w-5 text-center">EN</span><span>English</span></button>
                            <button onclick="switchLanguage('zh')" class="w-full px-4 py-2 text-left text-sm hover:bg-secondary flex items-center space-x-2"><span class="font-mono text-xs w-5 text-center">中</span><span>中文</span></button>
                            <button onclick="switchLanguage('ja')" class="w-full px-4 py-2 text-left text-sm hover:bg-secondary flex items-center space-x-2"><span class="font-mono text-xs w-5 text-center">日</span><span>日本語</span></button>
                        </div>
                    </div>
                    <button onclick="toggleTheme()" class="theme-toggle" aria-label="Toggle theme">
                        <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <a href="https://github.com/donghaozhang/qcut/releases" class="btn-dark px-4 py-2 rounded-full text-sm font-medium" data-i18n="nav.download">Download</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="pt-32 pb-24 px-6 flex items-center justify-center min-h-screen">
            <div class="w-full max-w-md" data-aos="fade-up">
                <div id="auth-status-banner" class="rounded-xl p-4 mb-6 text-center" style="background: var(--color-info-light); border: 1px solid var(--color-info);">
                    <p class="font-semibold" style="color: var(--color-info);">Google Sign-In</p>
                    <p id="auth-status-message" class="text-sm mt-1" style="color: var(--color-info);">Continue with Google to unlock billing and account features.</p>
                </div>

                <div class="card rounded-2xl p-8">
                    <!-- Tabs -->
                    <div class="flex border-b border-main mb-6">
                        <button type="button" id="tab-signin" onclick="showTab('signin')" class="pb-3 px-4 text-sm font-medium border-b-2 border-current" data-i18n="login.signIn">Sign In</button>
                        <button type="button" id="tab-signup" onclick="showTab('signup')" class="pb-3 px-4 text-sm font-medium text-muted border-b-2 border-transparent" data-i18n="login.signUp">Sign Up</button>
                    </div>

                    <!-- Sign In Form -->
                    <form id="form-signin" class="space-y-4">
                        <button id="google-login-button" type="button" onclick="startGoogleLogin()" class="w-full btn-dark py-2.5 rounded-full text-sm font-medium flex items-center justify-center gap-2">
                            <svg viewBox="0 0 24 24" class="w-4 h-4" aria-hidden="true" focusable="false"><path fill="currentColor" d="M21.35 11.1H12v2.98h5.44c-.24 1.52-1.72 4.45-5.44 4.45-3.27 0-5.93-2.7-5.93-6.03s2.66-6.03 5.93-6.03c1.86 0 3.11.79 3.82 1.47l2.6-2.52C16.77 3.9 14.59 3 12 3 6.97 3 2.9 7.12 2.9 12.2S6.97 21.4 12 21.4c6.93 0 8.64-4.86 8.64-7.37 0-.49-.05-.86-.12-1.22z"/></svg>
                            <span>Continue with Google</span>
                        </button>
                        <div class="text-center text-xs text-muted uppercase tracking-wide">or</div>
                        <div>
                            <label class="block text-sm font-medium mb-1" data-i18n="login.email">Email</label>
                            <input type="email" disabled class="w-full px-4 py-2.5 rounded-lg border border-main bg-secondary text-sm" placeholder="you@example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1" data-i18n="login.password">Password</label>
                            <input type="password" disabled class="w-full px-4 py-2.5 rounded-lg border border-main bg-secondary text-sm" placeholder="••••••••">
                        </div>
                        <div class="text-right"><a href="#" class="text-xs text-muted hover:text-primary" data-i18n="login.forgotPassword">Forgot password?</a></div>
                        <button type="button" disabled class="w-full btn-dark py-2.5 rounded-full text-sm font-medium opacity-50 cursor-not-allowed" data-i18n="login.submitSignIn">Sign In</button>
                    </form>

                    <!-- Sign Up Form -->
                    <form id="form-signup" class="space-y-4 hidden">
                        <div>
                            <label class="block text-sm font-medium mb-1" data-i18n="login.name">Name</label>
                            <input type="text" disabled class="w-full px-4 py-2.5 rounded-lg border border-main bg-secondary text-sm" placeholder="Your name">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1" data-i18n="login.email">Email</label>
                            <input type="email" disabled class="w-full px-4 py-2.5 rounded-lg border border-main bg-secondary text-sm" placeholder="you@example.com">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1" data-i18n="login.password">Password</label>
                            <input type="password" disabled class="w-full px-4 py-2.5 rounded-lg border border-main bg-secondary text-sm" placeholder="••••••••">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1" data-i18n="login.confirmPassword">Confirm Password</label>
                            <input type="password" disabled class="w-full px-4 py-2.5 rounded-lg border border-main bg-secondary text-sm" placeholder="••••••••">
                        </div>
                        <button type="button" disabled class="w-full btn-dark py-2.5 rounded-full text-sm font-medium opacity-50 cursor-not-allowed" data-i18n="login.submitSignUp">Create Account</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-12 px-6 border-t border-main">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-2">
                <img src="../assets/qcut-logo.png" alt="QCut" class="h-5 w-5">
                <span class="text-sm text-muted" data-i18n="footer.tagline">QCut — Free AI video editor</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="https://x.com/peter6759" target="_blank" class="text-muted hover:text-primary transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="../js/payment.js"></script>
    <script src="../theme.js"></script>
    <script src="../i18n.js"></script>
    <script>
        lucide.createIcons();
        (function(){var n=document.querySelector("nav");if(!n)return;var t=false;window.addEventListener("scroll",function(){if(!t){requestAnimationFrame(function(){n.classList.toggle("nav-scrolled",window.scrollY>10);t=false});t=true}},{passive:true})})();
        AOS.init({ duration: 600, easing: 'ease-out-quart', once: true, offset: 50 });
    </script>
    <script>
        function showTab(tab) {
            document.getElementById('form-signin').classList.toggle('hidden', tab !== 'signin');
            document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
            document.getElementById('tab-signin').className = tab === 'signin' ? 'pb-3 px-4 text-sm font-medium border-b-2 border-current' : 'pb-3 px-4 text-sm font-medium text-muted border-b-2 border-transparent';
            document.getElementById('tab-signup').className = tab === 'signup' ? 'pb-3 px-4 text-sm font-medium border-b-2 border-current' : 'pb-3 px-4 text-sm font-medium text-muted border-b-2 border-transparent';
        }

        function setAuthStatus({ text, isError }) {
            try {
                const bannerNode = document.getElementById("auth-status-banner");
                const messageNode = document.getElementById("auth-status-message");
                if (!bannerNode || !messageNode) {
                    return;
                }
                messageNode.textContent = text;
                if (isError) {
                    bannerNode.className = "rounded-xl p-4 mb-6 text-center";
                    bannerNode.style.background = "var(--color-error-light)";
                    bannerNode.style.border = "1px solid var(--color-error)";
                    return;
                }
                bannerNode.className = "rounded-xl p-4 mb-6 text-center";
                bannerNode.style.background = "var(--color-info-light)";
                bannerNode.style.border = "1px solid var(--color-info)";
            } catch {
                // Non-blocking UI update failure.
            }
        }

        function getQueryParam({ name }) {
            try {
                const params = new URLSearchParams(window.location.search);
                const value = params.get(name);
                if (typeof value !== "string") {
                    return "";
                }
                return value.trim();
            } catch {
                return "";
            }
        }

        function getSafeRedirectPath() {
            try {
                const defaultPath = getDefaultAccountPath({ page: "dashboard" });
                const candidate = getQueryParam({ name: "redirect" });
                if (candidate.length === 0) {
                    return defaultPath;
                }
                if (!candidate.startsWith("/")) {
                    return defaultPath;
                }
                if (candidate.startsWith("//")) {
                    return defaultPath;
                }
                return candidate;
            } catch {
                return getDefaultAccountPath({ page: "dashboard" });
            }
        }

        function resolveErrorMessage() {
            try {
                const authError = getQueryParam({ name: "auth_error" }) || getQueryParam({ name: "error" });
                if (authError.length === 0) {
                    return "";
                }
                if (authError === "no_session") {
                    return "Login expired before callback. Please try Google sign-in again.";
                }
                if (authError === "access_denied") {
                    return "Google sign-in was cancelled.";
                }
                return `Google sign-in failed: ${authError}`;
            } catch {
                return "Google sign-in failed";
            }
        }

        function getLoginUrlWithRedirect({ path }) {
            try {
                const url = new URL(window.location.href);
                url.search = "";
                url.hash = "";
                url.searchParams.set("redirect", path);
                return url.toString();
            } catch {
                return window.location.href;
            }
        }

        function getSiteBasePath() {
            try {
                const pathname = window.location.pathname;
                const accountMarker = "/account/";
                const markerIndex = pathname.indexOf(accountMarker);
                if (markerIndex <= 0) {
                    return "";
                }
                return pathname.slice(0, markerIndex);
            } catch {
                return "";
            }
        }

        function getDefaultAccountPath({ page }) {
            try {
                const normalizedPage = typeof page === "string" ? page.trim() : "";
                if (normalizedPage.length === 0) {
                    return "/account/dashboard.html";
                }
                const basePath = getSiteBasePath();
                return `${basePath}/account/${normalizedPage}.html`;
            } catch {
                return "/account/dashboard.html";
            }
        }

        function setGoogleButtonLoading({ loading }) {
            try {
                const button = document.getElementById("google-login-button");
                if (!button) {
                    return;
                }
                button.disabled = loading;
                button.style.opacity = loading ? "0.7" : "1";
                button.style.cursor = loading ? "wait" : "pointer";
                button.innerHTML = loading
                    ? "<span>Redirecting to Google...</span>"
                    : "<svg viewBox='0 0 24 24' class='w-4 h-4' aria-hidden='true' focusable='false'><path fill='currentColor' d='M21.35 11.1H12v2.98h5.44c-.24 1.52-1.72 4.45-5.44 4.45-3.27 0-5.93-2.7-5.93-6.03s2.66-6.03 5.93-6.03c1.86 0 3.11.79 3.82 1.47l2.6-2.52C16.77 3.9 14.59 3 12 3 6.97 3 2.9 7.12 2.9 12.2S6.97 21.4 12 21.4c6.93 0 8.64-4.86 8.64-7.37 0-.49-.05-.86-.12-1.22z'/></svg><span>Continue with Google</span>";
            } catch {
                // Non-blocking UI update failure.
            }
        }

        function processAuthCallback() {
            try {
                const hasToken = PaymentAPI.captureAuthTokenFromUrl();
                const redirectPath = getSafeRedirectPath();
                if (hasToken) {
                    setAuthStatus({
                        text: "Google login succeeded. Redirecting...",
                        isError: false,
                    });
                    window.setTimeout(() => {
                        window.location.replace(redirectPath);
                    }, 400);
                    return;
                }

                const errorMessage = resolveErrorMessage();
                if (errorMessage.length > 0) {
                    setAuthStatus({
                        text: errorMessage,
                        isError: true,
                    });
                    return;
                }

                if (PaymentAPI.isAuthenticated()) {
                    setAuthStatus({
                        text: "You are already signed in.",
                        isError: false,
                    });
                    return;
                }
            } catch {
                setAuthStatus({
                    text: "Failed to process authentication callback.",
                    isError: true,
                });
            }
        }

        function startGoogleLogin() {
            try {
                setGoogleButtonLoading({ loading: true });
                const apiBaseUrl = PaymentAPI.getApiBaseUrl();
                const redirectPath = getSafeRedirectPath();
                const errorRedirectUrl = getLoginUrlWithRedirect({ path: redirectPath });
                const startUrl = new URL("/api/auth/google/start", apiBaseUrl);
                const dashboardUrl = new URL(redirectPath, window.location.origin);
                startUrl.searchParams.set("redirect_url", dashboardUrl.toString());
                startUrl.searchParams.set("error_redirect_url", errorRedirectUrl);
                window.setTimeout(() => {
                    setGoogleButtonLoading({ loading: false });
                    setAuthStatus({
                        text: "Unable to reach Google login endpoint. Check license server URL and deployment.",
                        isError: true,
                    });
                }, 6000);
                window.location.assign(startUrl.toString());
            } catch (error) {
                setGoogleButtonLoading({ loading: false });
                setAuthStatus({
                    text:
                        error instanceof Error
                            ? `Unable to start Google login: ${error.message}`
                            : "Unable to start Google login.",
                    isError: true,
                });
            }
        }

        processAuthCallback();
    </script>
</body>
</html>
